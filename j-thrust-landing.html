<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>J-THRUST — Digital Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Raleway:wght@300;700&family=Poppins:wght@300;700&family=Inter:wght@300;700&family=Outfit:wght@300;700&family=Space+Grotesk:wght@300;700&family=Sora:wght@300;700&family=DM+Sans:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F;cursor:default}
canvas{display:block;width:100%;height:100%}
#ctrl{display:none;position:fixed;top:20px;right:20px;background:rgba(10,10,15,0.92);
  border:1px solid rgba(15,170,182,0.3);border-radius:10px;padding:16px 20px;
  font:13px Montserrat,sans-serif;color:#8aa020;z-index:10;min-width:260px}
#ctrl.show{display:block}
#ctrl label{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
#ctrl input[type=range]{width:130px;accent-color:#0FAAB6}
#ctrl .val{color:#c8e030;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
#ctrl .hint{color:rgba(15,170,182,0.4);font-size:10px;text-align:center;margin-top:8px}
#ctrl select{background:#151520;color:#c8e030;border:1px solid rgba(15,170,182,0.3);
  border-radius:4px;padding:2px 4px;font-size:11px;width:130px}
#ctrl .sep{border:none;border-top:1px solid rgba(15,170,182,0.15);margin:8px 0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
  <label>Title <input type="range" id="rTitle" min="0.04" max="0.14" step="0.005" value="0.045"><span class="val" id="vTitle"></span></label>
  <label>Subtitle <input type="range" id="rSub" min="0.15" max="0.55" step="0.01" value="0.29"><span class="val" id="vSub"></span></label>
  <label>Tagline <input type="range" id="rTag" min="0.06" max="0.30" step="0.005" value="0.145"><span class="val" id="vTag"></span></label>
  <label>Gap <input type="range" id="rGap" min="0.04" max="0.25" step="0.005" value="0.12"><span class="val" id="vGap"></span></label>
  <label>Line W <input type="range" id="rLine" min="0.3" max="1.2" step="0.05" value="0.8"><span class="val" id="vLine"></span></label>
  <label>Arc R <input type="range" id="rArc" min="150" max="300" step="5" value="220"><span class="val" id="vArc"></span></label>
  <hr class="sep">
  <label>Title Font <select id="fTitle"><option>Montserrat</option><option selected>Raleway</option><option>Poppins</option><option>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <label>Sub Font <select id="fSub"><option selected>Montserrat</option><option>Raleway</option><option>Poppins</option><option>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <label>Tag Font <select id="fTag"><option>Montserrat</option><option>Raleway</option><option>Poppins</option><option selected>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <hr class="sep">
  <label>Ball Size <input type="range" id="rBall" min="3" max="14" step="0.5" value="4"><span class="val" id="vBall"></span></label>
  <label>Glow <input type="range" id="rGlow" min="5" max="60" step="1" value="23"><span class="val" id="vGlow"></span></label>
  <label>Shine <input type="range" id="rShine" min="0.2" max="1.0" step="0.05" value="0.5"><span class="val" id="vShine"></span></label>
  <label>Partikel <input type="range" id="rParts" min="0" max="50" step="1" value="10"><span class="val" id="vParts"></span></label>
  <hr class="sep">
  <label>Atmen <input type="range" id="rBreath" min="0" max="1" step="1" value="1"><span class="val" id="vBreath"></span></label>
  <div class="hint">S = toggle · Werte live</div>
</div>
<script>
const C=document.getElementById('c'),$=C.getContext('2d');
let W,H,stars=[];

// === Neon-Partikel aus der Kugel ===
const NEON=['#ff006e','#ff5400','#ffbe0b','#00f5d4','#00bbf9','#9b5de5','#f15bb5','#fee440','#00cffd','#ff4d6d'];
let ballParts=[];   // Partikel IN der Kugel
let freeParts=[];   // Partikel die rausgefallen sind
let partTimer=0;    // Zähler für verzögerten Start

// === Kohärentes Atmen (5.5s ein, 5.5s aus) ===
const BREATH={in:5.5, out:5.5};
let breathStart=0, breathOn=false;
let audioCtx=null, noiseSource=null, noiseGain=null, filterNode=null;

function calcBreathWave(elapsed){
  let cycle=BREATH.in+BREATH.out;
  let phase=elapsed%cycle;
  if(phase<BREATH.in) return Math.sin((phase/BREATH.in)*Math.PI-Math.PI/2);
  return Math.sin(Math.PI/2-((phase-BREATH.in)/BREATH.out)*Math.PI);
}

function initBreathAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // White noise buffer
  let buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
  let d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  noiseSource=audioCtx.createBufferSource();
  noiseSource.buffer=buf; noiseSource.loop=true;
  // Bandpass filter
  filterNode=audioCtx.createBiquadFilter();
  filterNode.type='bandpass'; filterNode.frequency.value=350; filterNode.Q.value=0.8;
  // Gain
  noiseGain=audioCtx.createGain(); noiseGain.gain.value=0;
  noiseSource.connect(filterNode);
  filterNode.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseSource.start();
}

function stopBreathAudio(){
  if(!audioCtx) return;
  noiseGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.1);
}

function resize(){
  W=C.width=window.innerWidth*devicePixelRatio;
  H=C.height=window.innerHeight*devicePixelRatio;
  $.scale(devicePixelRatio,devicePixelRatio);
  W=window.innerWidth;H=window.innerHeight;
  C.style.width=W+'px';C.style.height=H+'px';
  stars=[];
  for(let i=0;i<200;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()<0.85?1:1.5,b:0.15+Math.random()*0.5});
  }
}
window.addEventListener('resize',resize);
resize();

function draw(){
  requestAnimationFrame(draw);
  // Slider values (read once per frame)
  let _t=+rTitle.value, _s=+rSub.value, _g=+rTag.value, _G=+rGap.value, _l=+rLine.value, _a=+rArc.value;
  let _b=+rBall.value, _gw=+rGlow.value, _sh=+rShine.value;
  let _parts=+rParts.value, _br=+rBreath.value;
  let _fT=fTitle.value+',sans-serif', _fS=fSub.value+',sans-serif', _fG=fTag.value+',sans-serif';
  vTitle.textContent=_t;vSub.textContent=_s;vTag.textContent=_g;vGap.textContent=_G;vLine.textContent=_l;vArc.textContent=_a;
  vBall.textContent=_b;vGlow.textContent=_gw;vShine.textContent=_sh;
  vParts.textContent=_parts;vBreath.textContent=_br?'AN':'AUS';

  // Atem-Toggle
  if(_br && !breathOn){breathOn=true; breathStart=Date.now()/1000; initBreathAudio();}
  if(!_br && breathOn){breathOn=false; stopBreathAudio();}

  // Atem-Welle berechnen
  let bw=0, breathMod=0;
  if(breathOn){
    bw=calcBreathWave(Date.now()/1000-breathStart);
    breathMod=(bw+1)/2; // 0=aus, 1=ein
    // Audio updaten
    if(audioCtx && noiseGain){
      let t2=audioCtx.currentTime;
      noiseGain.gain.setTargetAtTime(breathMod*0.22,t2,0.08);
      filterNode.frequency.setTargetAtTime(350+breathMod*400,t2,0.08);
      filterNode.Q.setTargetAtTime(0.8+breathMod*0.5,t2,0.08);
    }
  }
  $.clearRect(0,0,W,H);
  $.fillStyle='#0A0A0F';$.fillRect(0,0,W,H);

  // Stars
  for(let s of stars){
    $.fillStyle=`rgba(180,180,220,${s.b*(0.7+0.3*Math.sin(Date.now()*0.001+s.x))})`;
    $.fillRect(s.x,(s.y+Date.now()*0.005*s.b)%H,s.s,s.s);
  }

  $.textAlign='center';
  let cx=W/2,cy=H*0.38;
  let t=Date.now()*0.001;

  // Scale everything relative to viewport
  let sc=Math.min(W/800,H/600)*0.85;

  $.save();$.translate(cx,cy);$.scale(sc,sc);

  // === Arc — wraps logo + title + subtitle ===
  // Atem: Arc-Radius pulsiert ±3%
  let arcR=breathOn ? _a*(1+bw*0.03) : _a;

  // Atem-Nebel am äußeren Kreis (HINTER dem Arc)
  if(breathOn){
    let nebelInner=arcR-5;
    let nebelExpand=(0.3+breathMod*0.7)*arcR*0.15;
    let nebelOuter=arcR+nebelExpand;
    for(let layer=0;layer<3;layer++){
      let off=layer*arcR*0.02;
      let na=(0.15+breathMod*0.12)*(1-layer*0.3);
      let ng=$.createRadialGradient(0,0,nebelInner-off,0,0,nebelOuter+off);
      ng.addColorStop(0,'rgba(37,162,162,0)');
      ng.addColorStop(0.3,`rgba(37,162,162,${na*0.3})`);
      ng.addColorStop(0.6,`rgba(37,162,162,${na})`);
      ng.addColorStop(0.85,`rgba(37,162,162,${na*0.4})`);
      ng.addColorStop(1,'rgba(37,162,162,0)');
      $.fillStyle=ng;
      $.beginPath();$.arc(0,0,nebelOuter+off,0,Math.PI*2);$.fill();
    }
    let breathTime=Date.now()/1000-breathStart;
    for(let s=0;s<5;s++){
      let angle=(s/5)*Math.PI*2+breathTime*0.05;
      let sx=Math.cos(angle)*(arcR+nebelExpand*0.5);
      let sy=Math.sin(angle)*(arcR+nebelExpand*0.5);
      let streakR=arcR*0.08*(0.5+0.5*Math.sin(angle*3+breathTime));
      $.fillStyle=`rgba(37,162,162,${breathMod*0.12})`;
      $.beginPath();$.arc(sx,sy,streakR,0,Math.PI*2);$.fill();
    }
  }

  // Basis-Arc — IM VORDERGRUND über dem Nebel
  $.strokeStyle='rgba(255,70,90,0.06)';$.lineWidth=14;
  $.beginPath();$.arc(0,0,arcR,Math.PI*0.6,Math.PI*0.4);$.stroke();
  $.strokeStyle='rgba(255,70,90,0.25)';$.lineWidth=2;$.lineCap='round';
  $.beginPath();$.arc(0,0,arcR,Math.PI*0.6,Math.PI*0.4);$.stroke();

  // Warm glow bridge between hook and title
  let glowG=$.createRadialGradient(0,80,10,0,80,100);
  glowG.addColorStop(0,'rgba(222,156,54,0.06)');glowG.addColorStop(1,'rgba(222,156,54,0)');
  $.fillStyle=glowG;$.fillRect(-120,-20,240,200);

  // === Ship (Levi-Style: gelber Umriss) ===
  let shipBob=Math.sin(t*2)*3;
  let swing=Math.sin(t*1.2)*0.18;
  let SR=35; // Ship-Radius (skaliert von SHIP_R=10)
  let shipCY=-120; // Schiff-Zentrum Y

  $.save();$.translate(0,shipBob);
  // Ship hull — gelb wie Levi-Version
  $.shadowColor='#c8e030';$.shadowBlur=6;
  $.strokeStyle='#c8e030';$.lineWidth=2.5;
  $.beginPath();
  $.moveTo(0, shipCY-SR);
  $.lineTo(-SR*0.7, shipCY+SR*0.7);
  $.lineTo(-SR*0.3, shipCY+SR*0.4);
  $.lineTo(SR*0.3, shipCY+SR*0.4);
  $.lineTo(SR*0.7, shipCY+SR*0.7);
  $.closePath();$.stroke();
  $.shadowBlur=0;

  // Flame (organisch, wie echtes Feuer)
  let flicker=0.6+0.4*Math.sin(t*12);
  let flameY=shipCY+SR*0.5;
  let flLen=SR*(0.7+Math.sin(t*8)*0.15+Math.random()*0.2);
  // Äußere Flamme (Gold/Orange, gefüllt)
  $.fillStyle=`rgba(222,156,54,${flicker*0.8})`;
  $.beginPath();
  $.moveTo(-SR*0.25, flameY);
  $.lineTo(0, flameY+flLen);
  $.lineTo(SR*0.25, flameY);
  $.closePath();$.fill();
  // Innere Flamme (helleres Gold)
  $.fillStyle=`rgba(253,191,85,${flicker*0.6})`;
  $.beginPath();
  $.moveTo(-SR*0.12, flameY);
  $.lineTo(0, flameY+flLen*0.65);
  $.lineTo(SR*0.12, flameY);
  $.closePath();$.fill();
  // Heißer Kern (fast weiß)
  $.fillStyle=`rgba(255,240,180,${flicker*0.4})`;
  $.beginPath();
  $.moveTo(-SR*0.05, flameY);
  $.lineTo(0, flameY+flLen*0.35);
  $.lineTo(SR*0.05, flameY);
  $.closePath();$.fill();
  $.restore();

  // === Tether + swinging J-Hook ===
  $.save();$.translate(0,shipBob);
  let tetherLen=80;
  let ax=0, ay=shipCY+SR*0.7+5;  // Tether startet am Schiffsboden
  let jx=Math.sin(swing)*tetherLen;
  let jy=ay+Math.cos(swing)*tetherLen;

  // Tether line (Cyan wie im Spiel)
  $.strokeStyle='rgba(0,170,170,0.5)';$.lineWidth=2;$.setLineDash([6,4]);
  $.beginPath();$.moveTo(ax,ay);$.quadraticCurveTo(ax+jx*0.3,ay+(jy-ay)*0.5,jx,jy);$.stroke();
  $.setLineDash([]);

  // J-Hook at end
  $.save();$.translate(jx,jy);$.rotate(swing*0.5);
  let jhg=$.createLinearGradient(0,-16,-14,55);jhg.addColorStop(0,'#0FAAB6');jhg.addColorStop(1,'#DE9C36');
  $.fillStyle=jhg;
  $.beginPath();
  $.moveTo(-6,-16);$.lineTo(6,-16);
  $.lineTo(6,18);$.quadraticCurveTo(6,42,-8,52);
  $.quadraticCurveTo(-20,58,-30,54);$.quadraticCurveTo(-38,48,-38,38);
  $.lineTo(-26,38);$.quadraticCurveTo(-26,46,-18,50);
  $.quadraticCurveTo(-8,52,-4,42);$.quadraticCurveTo(0,36,0,28);
  $.lineTo(-6,28);$.lineTo(-6,-16);$.closePath();$.fill();

  // Ball with inertia
  let ballT=-swing*3.5;
  let bx=-16+ballT*10;
  let by=44-Math.abs(ballT)*5;
  bx=Math.max(-28,Math.min(-6,bx));

  // Atem: Kugel-Radius pulsiert ±8%
  let breathR=_b;
  if(breathOn) breathR=_b*(1+bw*0.08);

  // === Atem-Nebel (Cyan #25a2a2) — vor dem Ball ===
  if(breathOn){
    let nebelOuter=breathR*(2.5+breathMod*2);
    let ng=$.createRadialGradient(bx,by,breathR*0.3,bx,by,nebelOuter);
    let na=0.4+breathMod*0.4;
    ng.addColorStop(0,`rgba(37,162,162,${na})`);
    ng.addColorStop(0.3,`rgba(37,162,162,${na*0.5})`);
    ng.addColorStop(0.6,`rgba(37,162,162,${na*0.15})`);
    ng.addColorStop(1,'rgba(37,162,162,0)');
    $.fillStyle=ng;
    $.beginPath();$.arc(bx,by,nebelOuter,0,Math.PI*2);$.fill();
    // Zweiter Ring, versetzt
    let ng2=$.createRadialGradient(bx,by,breathR,bx,by,nebelOuter*0.7);
    ng2.addColorStop(0,`rgba(60,200,200,${na*0.3})`);
    ng2.addColorStop(1,'rgba(60,200,200,0)');
    $.fillStyle=ng2;
    $.beginPath();$.arc(bx,by,nebelOuter*0.7,0,Math.PI*2);$.fill();
  }

  // === Glow: radial gradient (eine einzige Fläche, viel sichtbarer) ===
  let glowOuter=breathR+_gw*0.6;
  let gg=$.createRadialGradient(bx,by,breathR*0.5,bx,by,glowOuter);
  gg.addColorStop(0,`rgba(253,210,80,${_sh*0.5})`);
  gg.addColorStop(0.4,`rgba(253,190,60,${_sh*0.3})`);
  gg.addColorStop(0.7,`rgba(253,170,40,${_sh*0.12})`);
  gg.addColorStop(1,'rgba(253,170,40,0)');
  $.fillStyle=gg;
  $.beginPath();$.arc(bx,by,glowOuter,0,Math.PI*2);$.fill();

  // === Rim ring ===
  $.strokeStyle=`rgba(253,230,140,${_sh})`;
  $.lineWidth=1+_sh*1.5;
  $.beginPath();$.arc(bx,by,breathR+2,0,Math.PI*2);$.stroke();

  // === Ball body ===
  let ballG=$.createRadialGradient(bx-breathR*0.3,by-breathR*0.3,breathR*0.1,bx,by,breathR);
  ballG.addColorStop(0,'rgba(140,90,30,0.7)');
  ballG.addColorStop(0.6,'rgba(200,140,45,0.85)');
  ballG.addColorStop(1,`rgba(253,200,80,${0.4+_sh*0.6})`);
  $.fillStyle=ballG;$.beginPath();$.arc(bx,by,breathR,0,Math.PI*2);$.fill();

  // === Neon-Partikel IN der Kugel ===
  partTimer++;
  if(_parts>0 && partTimer>180 && ballParts.length<_parts){
    if(Math.random()<0.12){
      let ang=Math.random()*Math.PI*2;
      let spd=0.3+Math.random()*0.6;
      ballParts.push({
        x:bx, y:by-breathR*0.3,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        life:1, decay:0.001+Math.random()*0.002,
        size:0.8+Math.random()*1.5,
        color:NEON[Math.floor(Math.random()*NEON.length)],
        age:0
      });
    }
  }
  // Max begrenzen wenn Slider runtergedreht
  while(ballParts.length>_parts && _parts>=0) ballParts.shift();

  // Clip auf Kugelbereich
  $.save();
  $.beginPath();$.arc(bx,by,breathR-0.5,0,Math.PI*2);$.clip();

  for(let i=ballParts.length-1;i>=0;i--){
    let p=ballParts[i];
    p.vy+=0.015;
    p.vx*=0.985; p.vy*=0.985;
    p.vx+=(Math.random()-0.5)*0.05;
    p.vy+=(Math.random()-0.5)*0.05;
    p.x+=p.vx; p.y+=p.vy;
    p.life-=p.decay; p.age++;

    let dx=p.x-bx, dy=p.y-by;
    let dist=Math.sqrt(dx*dx+dy*dy);
    let maxR=breathR*0.85;
    if(dist>maxR){
      let nx=dx/dist, ny=dy/dist;
      p.x=bx+nx*maxR; p.y=by+ny*maxR;
      let dot=p.vx*nx+p.vy*ny;
      if(dot>0){p.vx-=2*dot*nx; p.vy-=2*dot*ny;}
      p.vx*=0.5; p.vy*=0.5;
      if(partTimer>600 && ny>0.5 && Math.random()<0.05){
        // Konvertiere in Screen-Koordinaten
        let rot=swing*0.5;
        let rx=p.x*Math.cos(rot)-p.y*Math.sin(rot)+jx;
        let ry=p.x*Math.sin(rot)+p.y*Math.cos(rot)+jy+shipBob;
        let svx=(p.vx+swing*2)*sc;  // Schwung-Impuls vom Pendel
        let svy=Math.abs(p.vy)*0.3*sc+0.5;
        freeParts.push({x:cx+rx*sc, y:cy+ry*sc, vx:svx, vy:svy,
          life:1, decay:0.002+Math.random()*0.002, size:p.size*sc, color:p.color, age:0});
        ballParts.splice(i,1); continue;
      }
    }
    if(p.life<=0){ballParts.splice(i,1); continue;}

    $.globalAlpha=p.life*0.9;
    $.fillStyle=p.color;
    $.beginPath();$.arc(p.x,p.y,p.size,0,Math.PI*2);$.fill();
    if(p.age<6){
      $.globalAlpha=(1-p.age/6)*0.5;
      $.fillStyle='#fff';
      $.beginPath();$.arc(p.x,p.y,p.size*1.8,0,Math.PI*2);$.fill();
    }
  }
  $.globalAlpha=1;
  $.restore(); // end clip

  // === Specular highlight ===
  $.fillStyle=`rgba(255,245,200,${0.2+_sh*0.6})`;
  $.beginPath();$.arc(bx-breathR*0.3,by-breathR*0.35,breathR*0.3,0,Math.PI*2);$.fill();

  // (freie Partikel werden nach dem Text gezeichnet)
  $.restore();
  $.restore();

  $.restore(); // end main scale

  // === Lockup — Slider-gesteuert ===
  let fontSize=Math.max(32,Math.min(120,W*_t));
  let subSize=Math.round(fontSize*_s);
  let tagSize=Math.round(fontSize*_g);
  let G=Math.round(fontSize*_G);
  let titleY=cy+sc*135;

  // Positionen: G zwischen Baseline/Capline jedes Elements
  let lineY=titleY+G;                             // Title baseline + G → Linie
  let subY=lineY+G+Math.round(subSize*0.72);      // Linie + G + Cap-Height → Sub baseline
  let tagY=subY+G+Math.round(tagSize*0.72);       // Sub baseline + G + Cap-Height → Tag baseline

  // Title
  $.font=`700 ${fontSize}px ${_fT}`;
  let titleW=$.measureText('J-THRUST').width;
  $.shadowColor='#c8e030';$.shadowBlur=30*sc;
  $.fillStyle='rgba(200,224,48,0.12)';
  $.fillText('J-THRUST',cx,titleY);
  $.shadowBlur=12*sc;
  $.fillStyle='#c8e030';
  $.fillText('J-THRUST',cx,titleY);
  $.shadowBlur=0;

  // Accent line — 80% Titelbreite, 2px
  let lineW=titleW*_l;
  let lg=$.createLinearGradient(cx-lineW/2,0,cx+lineW/2,0);
  lg.addColorStop(0,'rgba(15,170,182,0.05)');lg.addColorStop(0.3,'rgba(15,170,182,0.5)');
  lg.addColorStop(0.7,'rgba(222,156,54,0.5)');lg.addColorStop(1,'rgba(222,156,54,0.05)');
  $.strokeStyle=lg;$.lineWidth=2;
  $.beginPath();$.moveTo(cx-lineW/2,lineY);$.lineTo(cx+lineW/2,lineY);$.stroke();

  // Subtitle
  $.fillStyle='rgba(138,160,32,0.5)';$.font=`300 ${subSize}px ${_fS}`;
  $.letterSpacing=Math.round(subSize*0.35)+'px';
  $.fillText('DIGITAL STUDIO',cx,subY);
  $.letterSpacing='0px';

  // Tagline
  $.font=`300 ${tagSize}px ${_fG}`;
  $.letterSpacing=Math.round(tagSize*0.2)+'px';
  $.fillStyle='rgba(15,170,182,0.4)';
  $.fillText('GRAVITY  ·  REACH  ·  STRUCTURE',cx,tagY);
  $.letterSpacing='0px';

  $.textAlign='left';

  // === Freie Partikel (Screen-Koordinaten, ÜBER den Texten) ===
  for(let i=freeParts.length-1;i>=0;i--){
    let p=freeParts[i];
    p.vy+=0.12;  // Gravitation (Screen-Pixel)
    p.vx*=0.995;  // Wenig Reibung → weites Streuen
    p.vx+=(Math.random()-0.5)*0.3;  // Brownian
    p.x+=p.vx; p.y+=p.vy;
    p.life-=p.decay; p.age++;
    if(p.life<=0 || p.y>H+20){freeParts.splice(i,1); continue;}
    $.globalAlpha=p.life*0.85;
    $.fillStyle=p.color;
    $.beginPath();$.arc(p.x,p.y,p.size,0,Math.PI*2);$.fill();
    // Glow
    $.globalAlpha=p.life*0.25;
    $.beginPath();$.arc(p.x,p.y,p.size*3,0,Math.PI*2);$.fill();
  }
  $.globalAlpha=1;
}

draw();
document.addEventListener('keydown',e=>{if(e.key==='s'||e.key==='S')ctrl.classList.toggle('show')});
// AudioContext braucht User-Gesture (Safari)
function resumeAudio(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
document.addEventListener('click',resumeAudio);
document.addEventListener('keydown',resumeAudio);
</script>
