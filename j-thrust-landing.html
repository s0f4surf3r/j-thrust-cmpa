<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>J-THRUST — Digital Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Raleway:wght@300;700&family=Poppins:wght@300;700&family=Inter:wght@300;700&family=Outfit:wght@300;700&family=Space+Grotesk:wght@300;700&family=Sora:wght@300;700&family=DM+Sans:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F;cursor:default}
canvas{display:block;width:100%;height:100%}
#ctrl{display:none;position:fixed;top:20px;right:20px;background:rgba(10,10,15,0.92);
  border:1px solid rgba(15,170,182,0.3);border-radius:10px;padding:16px 20px;
  font:13px Montserrat,sans-serif;color:#8aa020;z-index:10;min-width:260px}
#ctrl.show{display:block}
#ctrl label{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
#ctrl input[type=range]{width:130px;accent-color:#0FAAB6}
#ctrl .val{color:#c8e030;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
#ctrl .hint{color:rgba(15,170,182,0.4);font-size:10px;text-align:center;margin-top:8px}
#ctrl select{background:#151520;color:#c8e030;border:1px solid rgba(15,170,182,0.3);
  border-radius:4px;padding:2px 4px;font-size:11px;width:130px}
#ctrl .sep{border:none;border-top:1px solid rgba(15,170,182,0.15);margin:8px 0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
  <label>Title <input type="range" id="rTitle" min="0.04" max="0.14" step="0.005" value="0.08"><span class="val" id="vTitle"></span></label>
  <label>Subtitle <input type="range" id="rSub" min="0.15" max="0.55" step="0.01" value="0.32"><span class="val" id="vSub"></span></label>
  <label>Tagline <input type="range" id="rTag" min="0.06" max="0.30" step="0.005" value="0.155"><span class="val" id="vTag"></span></label>
  <label>Gap <input type="range" id="rGap" min="0.04" max="0.25" step="0.005" value="0.12"><span class="val" id="vGap"></span></label>
  <label>Line W <input type="range" id="rLine" min="0.3" max="1.2" step="0.05" value="0.8"><span class="val" id="vLine"></span></label>
  <label>Arc R <input type="range" id="rArc" min="150" max="300" step="5" value="220"><span class="val" id="vArc"></span></label>
  <hr class="sep">
  <label>Title Font <select id="fTitle"><option>Montserrat</option><option>Raleway</option><option>Poppins</option><option>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <label>Sub Font <select id="fSub"><option>Montserrat</option><option>Raleway</option><option>Poppins</option><option>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <label>Tag Font <select id="fTag"><option>Montserrat</option><option>Raleway</option><option>Poppins</option><option>Inter</option><option>Outfit</option><option>Space Grotesk</option><option>Sora</option><option>DM Sans</option></select></label>
  <hr class="sep">
  <label>Ball Size <input type="range" id="rBall" min="3" max="14" step="0.5" value="7"><span class="val" id="vBall"></span></label>
  <label>Glow <input type="range" id="rGlow" min="5" max="60" step="1" value="35"><span class="val" id="vGlow"></span></label>
  <label>Shine <input type="range" id="rShine" min="0.2" max="1.0" step="0.05" value="0.9"><span class="val" id="vShine"></span></label>
  <div class="hint">S = toggle · Werte live</div>
</div>
<script>
const C=document.getElementById('c'),$=C.getContext('2d');
let W,H,stars=[];

function resize(){
  W=C.width=window.innerWidth*devicePixelRatio;
  H=C.height=window.innerHeight*devicePixelRatio;
  $.scale(devicePixelRatio,devicePixelRatio);
  W=window.innerWidth;H=window.innerHeight;
  C.style.width=W+'px';C.style.height=H+'px';
  stars=[];
  for(let i=0;i<200;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()<0.85?1:1.5,b:0.15+Math.random()*0.5});
  }
}
window.addEventListener('resize',resize);
resize();

function draw(){
  requestAnimationFrame(draw);
  // Slider values (read once per frame)
  let _t=+rTitle.value, _s=+rSub.value, _g=+rTag.value, _G=+rGap.value, _l=+rLine.value, _a=+rArc.value;
  let _b=+rBall.value, _gw=+rGlow.value, _sh=+rShine.value;
  let _fT=fTitle.value+',sans-serif', _fS=fSub.value+',sans-serif', _fG=fTag.value+',sans-serif';
  vTitle.textContent=_t;vSub.textContent=_s;vTag.textContent=_g;vGap.textContent=_G;vLine.textContent=_l;vArc.textContent=_a;
  vBall.textContent=_b;vGlow.textContent=_gw;vShine.textContent=_sh;
  $.clearRect(0,0,W,H);
  $.fillStyle='#0A0A0F';$.fillRect(0,0,W,H);

  // Stars
  for(let s of stars){
    $.fillStyle=`rgba(180,180,220,${s.b*(0.7+0.3*Math.sin(Date.now()*0.001+s.x))})`;
    $.fillRect(s.x,(s.y+Date.now()*0.005*s.b)%H,s.s,s.s);
  }

  $.textAlign='center';
  let cx=W/2,cy=H*0.38;
  let t=Date.now()*0.001;

  // Scale everything relative to viewport
  let sc=Math.min(W/800,H/600)*0.85;

  $.save();$.translate(cx,cy);$.scale(sc,sc);

  // === Arc — wraps logo + title + subtitle ===
  $.strokeStyle='rgba(15,170,182,0.04)';$.lineWidth=14;
  $.beginPath();$.arc(0,0,_a,Math.PI*0.6,Math.PI*0.4);$.stroke();
  let arcG=$.createLinearGradient(-_a,-_a*0.6,_a*0.82,_a*1.05);
  arcG.addColorStop(0,'rgba(15,170,182,0.02)');arcG.addColorStop(0.35,'rgba(15,170,182,0.18)');
  arcG.addColorStop(0.7,'rgba(222,156,54,0.12)');arcG.addColorStop(1,'rgba(222,156,54,0.03)');
  $.strokeStyle=arcG;$.lineWidth=2;$.lineCap='round';
  $.beginPath();$.arc(0,0,_a,Math.PI*0.6,Math.PI*0.4);$.stroke();

  // Warm glow bridge between hook and title
  let glowG=$.createRadialGradient(0,80,10,0,80,100);
  glowG.addColorStop(0,'rgba(222,156,54,0.06)');glowG.addColorStop(1,'rgba(222,156,54,0)');
  $.fillStyle=glowG;$.fillRect(-120,-20,240,200);

  // === Ship ===
  let shipBob=Math.sin(t*2)*3;
  let swing=Math.sin(t*1.2)*0.18;

  $.save();$.translate(0,shipBob);
  // Hull
  $.fillStyle='#0FAAB6';$.beginPath();
  $.moveTo(0,-160);$.lineTo(-22,-100);$.lineTo(-12,-108);$.lineTo(-12,-88);
  $.lineTo(12,-88);$.lineTo(12,-108);$.lineTo(22,-100);$.closePath();$.fill();
  // Cockpit
  $.fillStyle='#0D8A94';$.beginPath();$.ellipse(0,-130,7,9,0,0,Math.PI*2);$.fill();
  $.fillStyle='rgba(15,170,182,0.5)';$.beginPath();$.ellipse(0,-132,5,6,0,0,Math.PI*2);$.fill();
  // Struts
  $.fillStyle='rgba(15,170,182,0.5)';$.fillRect(-20,-88,40,5);
  // Flame
  let flicker=0.6+0.4*Math.sin(t*12);
  $.fillStyle=`rgba(222,156,54,${flicker*0.8})`;
  $.beginPath();$.moveTo(-8,-83);$.lineTo(0,-55-Math.sin(t*8)*5);$.lineTo(8,-83);$.closePath();$.fill();
  $.fillStyle=`rgba(253,191,85,${flicker*0.6})`;
  $.beginPath();$.moveTo(-5,-83);$.lineTo(0,-65-Math.sin(t*10)*4);$.lineTo(5,-83);$.closePath();$.fill();
  $.restore();

  // === Tether + swinging J-Hook ===
  $.save();$.translate(0,shipBob);
  let tetherLen=80;
  let ax=0,ay=-83+5;
  let jx=Math.sin(swing)*tetherLen;
  let jy=ay+Math.cos(swing)*tetherLen;

  // Tether line
  $.strokeStyle='rgba(15,170,182,0.4)';$.lineWidth=2;$.setLineDash([6,4]);
  $.beginPath();$.moveTo(ax,ay);$.quadraticCurveTo(ax+jx*0.3,ay+(jy-ay)*0.5,jx,jy);$.stroke();
  $.setLineDash([]);

  // J-Hook at end
  $.save();$.translate(jx,jy);$.rotate(swing*0.5);
  let jhg=$.createLinearGradient(0,-16,-14,55);jhg.addColorStop(0,'#0FAAB6');jhg.addColorStop(1,'#DE9C36');
  $.fillStyle=jhg;
  $.beginPath();
  $.moveTo(-6,-16);$.lineTo(6,-16);
  $.lineTo(6,18);$.quadraticCurveTo(6,42,-8,52);
  $.quadraticCurveTo(-20,58,-30,54);$.quadraticCurveTo(-38,48,-38,38);
  $.lineTo(-26,38);$.quadraticCurveTo(-26,46,-18,50);
  $.quadraticCurveTo(-8,52,-4,42);$.quadraticCurveTo(0,36,0,28);
  $.lineTo(-6,28);$.lineTo(-6,-16);$.closePath();$.fill();

  // Ball with inertia
  let ballT=-swing*3.5;
  let bx=-16+ballT*10;
  let by=44-Math.abs(ballT)*5;
  bx=Math.max(-28,Math.min(-6,bx));
  // Aura (Shine = Rand-Intensität)
  $.shadowColor=`rgba(253,220,120,${_sh})`;$.shadowBlur=_gw/sc;
  $.fillStyle=`rgba(222,156,54,${0.15*_sh})`;$.beginPath();$.arc(bx,by,_b*2.5,0,Math.PI*2);$.fill();
  // Rim ring (leuchtet mit Shine)
  $.shadowBlur=_gw*0.4/sc;
  $.strokeStyle=`rgba(253,220,120,${_sh*0.9})`;$.lineWidth=1.5;
  $.beginPath();$.arc(bx,by,_b+1,0,Math.PI*2);$.stroke();
  $.shadowBlur=0;
  // Ball body (konstant, dunklerer Kern)
  let ballG=$.createRadialGradient(bx-_b*0.3,by-_b*0.3,_b*0.1,bx,by,_b);
  ballG.addColorStop(0,'rgba(180,120,40,0.6)');
  ballG.addColorStop(0.7,`rgba(222,156,54,0.85)`);
  ballG.addColorStop(1,`rgba(253,200,80,${0.5+_sh*0.5})`);
  $.fillStyle=ballG;$.beginPath();$.arc(bx,by,_b,0,Math.PI*2);$.fill();
  // Specular highlight (kleiner Lichtpunkt oben links)
  $.fillStyle=`rgba(255,240,180,${0.3+_sh*0.4})`;$.beginPath();$.arc(bx-_b*0.3,by-_b*0.35,_b*0.25,0,Math.PI*2);$.fill();
  $.restore();
  $.restore();

  $.restore(); // end main scale

  // === Lockup — Slider-gesteuert ===
  let fontSize=Math.max(32,Math.min(120,W*_t));
  let subSize=Math.round(fontSize*_s);
  let tagSize=Math.round(fontSize*_g);
  let G=Math.round(fontSize*_G);
  let titleY=cy+sc*135;

  // Positionen: G zwischen Baseline/Capline jedes Elements
  let lineY=titleY+G;                             // Title baseline + G → Linie
  let subY=lineY+G+Math.round(subSize*0.72);      // Linie + G + Cap-Height → Sub baseline
  let tagY=subY+G+Math.round(tagSize*0.72);       // Sub baseline + G + Cap-Height → Tag baseline

  // Title
  $.font=`700 ${fontSize}px ${_fT}`;
  let titleW=$.measureText('J-THRUST').width;
  $.shadowColor='#c8e030';$.shadowBlur=30*sc;
  $.fillStyle='rgba(200,224,48,0.12)';
  $.fillText('J-THRUST',cx,titleY);
  $.shadowBlur=12*sc;
  $.fillStyle='#c8e030';
  $.fillText('J-THRUST',cx,titleY);
  $.shadowBlur=0;

  // Accent line — 80% Titelbreite, 2px
  let lineW=titleW*_l;
  let lg=$.createLinearGradient(cx-lineW/2,0,cx+lineW/2,0);
  lg.addColorStop(0,'rgba(15,170,182,0.05)');lg.addColorStop(0.3,'rgba(15,170,182,0.5)');
  lg.addColorStop(0.7,'rgba(222,156,54,0.5)');lg.addColorStop(1,'rgba(222,156,54,0.05)');
  $.strokeStyle=lg;$.lineWidth=2;
  $.beginPath();$.moveTo(cx-lineW/2,lineY);$.lineTo(cx+lineW/2,lineY);$.stroke();

  // Subtitle
  $.fillStyle='rgba(138,160,32,0.5)';$.font=`300 ${subSize}px ${_fS}`;
  $.letterSpacing=Math.round(subSize*0.35)+'px';
  $.fillText('DIGITAL STUDIO',cx,subY);
  $.letterSpacing='0px';

  // Tagline
  $.font=`300 ${tagSize}px ${_fG}`;
  $.letterSpacing=Math.round(tagSize*0.2)+'px';
  $.fillStyle='rgba(15,170,182,0.4)';
  $.fillText('GRAVITY  ·  REACH  ·  STRUCTURE',cx,tagY);
  $.letterSpacing='0px';

  $.textAlign='left';
}

draw();
document.addEventListener('keydown',e=>{if(e.key==='s'||e.key==='S')ctrl.classList.toggle('show')});
</script>
</body>
</html>
